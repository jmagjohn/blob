<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chill Click Ball</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%AB%A7%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%AB%A7%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="aurora__blob aurora__blob--1"></span>
    <span class="aurora__blob aurora__blob--2"></span>
    <span class="aurora__blob aurora__blob--3"></span>
  </div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="app" aria-labelledby="app-title">
    <h1 id="app-title" class="app__title">breathe</h1>

    <section class="app__playground" aria-label="Relaxation playground">
      <button
        class="ball"
        id="stress-ball"
        type="button"
        aria-label="Stress ball. Press or hit Enter/Space repeatedly."
      >
        <canvas
          id="blob-canvas"
          class="blob-canvas"
          aria-hidden="true"
        ></canvas>
      </button>
      <div class="floating-layer" id="floating-layer" aria-hidden="true"></div>
    </section>

    <section class="app__controls" aria-label="Encouragement">
      <div class="quote-box" id="quote-box" aria-live="polite"></div>
      <p class="hint">tap the blob</p>
    </section>

  </main>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
